<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Jadeng! 💖</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght=700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- General Aesthetic Styling --- */
      body {
        margin: 0;
        padding: 0;
        background: #ffccd5;
        background: linear-gradient(
          135deg,
          #ffb3c1 0%,
          #ffccd5 40%,
          #d8bbff 100%
        );
        font-family: "Poppins", sans-serif;
        color: #4a3b4e;
        overflow-x: hidden;
        text-align: center;
        min-height: 100vh;
      }

      /* Floating background particles */
      .background-petals {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .petal {
        position: absolute;
        display: block;
        width: 15px;
        height: 15px;
        border-radius: 50% 50% 0 50%;
        transform: rotate(45deg);
        animation: float 7s infinite ease-in-out;
      }

      @keyframes float {
        0% {
          transform: translateY(-10px) rotate(45deg) scale(1);
          opacity: 0;
        }
        50% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(100vh) rotate(225deg) scale(1.4);
          opacity: 0;
        }
      }

      /* --- Content Layout --- */
      .container {
        position: relative;
        z-index: 1;
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      header h1 {
        font-family: "Dancing Script", cursive;
        font-size: 4.5rem;
        color: #ff0a54;
        margin-bottom: 10px;
        text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.7);
        animation: fadeInDown 1.5s ease;
      }

      header p {
        font-size: 1.2rem;
        color: #6d597a;
        margin-bottom: 40px;
        animation: fadeInUp 1.5s ease;
      }

      /* --- Interactive Image Buttons --- */
      .flowers-container {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin: 40px 0;
        animation: fadeInUp 2s ease;
      }

      .clickable-img-container {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 4px solid #fff;
        overflow: hidden;
        cursor: pointer;
        box-shadow: 0 8px 16px rgba(109, 89, 122, 0.2);
        transition: all 0.3s ease;
        animation: pulse 2s infinite alternate;
      }

      .clickable-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }

      .clickable-img-container:hover {
        transform: scale(1.15) rotate(5deg);
        border-color: #ff0a54;
        box-shadow: 0 12px 20px rgba(255, 10, 84, 0.3);
      }

      .clickable-img-container:hover img {
        transform: scale(1.1);
      }

      @keyframes pulse {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-12px);
        }
      }

      /* --- Video Slot Styling --- */
      .video-section {
        background: rgba(255, 255, 255, 0.45);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 8px 32px 0 rgba(109, 89, 122, 0.15);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        margin-top: 40px;
        animation: fadeIn 2.5s ease;
      }

      .video-section h2 {
        font-family: "Dancing Script", cursive;
        font-size: 2.7rem;
        color: #7209b7;
        margin-top: 0;
        text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
      }

      .video-frame {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        border-radius: 15px;
        border: 6px solid #fff;
        box-shadow: 0 12px 24px rgba(109, 89, 122, 0.15);
      }

      .video-frame video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background-color: #f3e5f5;
      }

      /* --- Popup Modal (Optimized for long letters) --- */
      .modal {
        display: none;
        position: fixed;
        z-index: 10;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(74, 59, 78, 0.3);
        backdrop-filter: blur(5px);
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .modal-content {
        background: white;
        margin: 10% auto;
        padding: 35px 30px;
        border-radius: 24px;
        width: 85%;
        max-width: 500px;
        max-height: 70vh; /* Prevents overflow on smaller screens */
        overflow-y: auto; /* Adds a clean scrollbar if text is too long */
        text-align: left; /* Easier to read long text left-aligned */
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        transform: translateY(-40px);
        transition: transform 0.4s ease;
        border: 3px solid #b5179e;
      }

      .modal.show {
        opacity: 1;
      }

      .modal.show .modal-content {
        transform: translateY(0);
      }

      .modal-text {
        font-size: 1.05rem;
        color: #4a3b4e;
        font-weight: 400;
        line-height: 1.7;
        white-space: pre-line; /* Preserves paragraph spacing */
      }

      .close-btn {
        color: #bbb;
        float: right;
        font-size: 32px;
        font-weight: bold;
        cursor: pointer;
        margin-top: -25px;
        margin-right: -10px;
        transition: color 0.2s;
      }

      .close-btn:hover {
        color: #ff0a54;
      }

      /* Customize Scrollbar inside Modal */
      .modal-content::-webkit-scrollbar {
        width: 6px;
      }
      .modal-content::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
      }
      .modal-content::-webkit-scrollbar-thumb {
        background: #ffccd5;
        border-radius: 10px;
      }
      .modal-content::-webkit-scrollbar-thumb:hover {
        background: #ffb3c1;
      }

      /* Entrance Animations */
      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- Floating Background Elements -->
    <div class="background-petals" id="petals"></div>

    <div class="container">
      <!-- Header -->
      <header>
        <h1>Happy Birthday, Jadeng ko!</h1>
        <p>
          To the girl who makes my world so much brighter.<br />Click the image
          below baby!
        </p>
      </header>

      <!-- Interactive Image Slots -->
      <div class="flowers-container">
        <!-- Image 1 -->
        <div class="clickable-img-container" onclick="openMessage(1)">
          <img src="Images/photo 1.jpg" alt="Memory 1" />
        </div>
        <!-- Image 2 -->
        <div class="clickable-img-container" onclick="openMessage(2)">
          <img src="Images/photo 2.jpg" alt="Memory 2" />
        </div>
        <!-- Image 3 -->
        <div class="clickable-img-container" onclick="openMessage(3)">
          <img src="Images/photo 3.jpg" alt="Memory 3" />
        </div>
      </div>

      <!-- Video Section -->
      <section class="video-section">
        <h2>A Little Something For You...</h2>
        <div class="video-frame">
          <!-- Replace 'your-short-film.mp4' with your actual video file name -->
          <video controls>
            <source src="Images/vid1.mp4" type="video/mp4" />
            Your browser does not support the video tag.
          </video>
        </div>
        <p style="margin-top: 15px; font-size: 0.9rem; color: #6d597a">
          Press play when you're ready.
        </p>
      </section>
    </div>

    <!-- Popup Modal -->
    <div id="messageModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <p class="modal-text" id="modalText">Message goes here</p>
      </div>
    </div>

    <!-- JavaScript for Letters and Animations -->
    <script>
      // Store your beautiful letters safely here
      const letters = {
        1: `Happy Birthday! As you celebrate another year of life, I want to take this opportunity to express my deepest appreciation for everything that you are.

Looking back at the past months, I am consistently amazed by your dedication, wisdom, and grace. You handle every challenge with so much strength, and you never fail to inspire everyone around you most especially me. Higit sa lahat, nagpapasalamat ako sa walang sawang suporta at pagmamahal na ibinibigay mo araw-araw. Your presence in my life is a profound blessing, and I am incredibly grateful to stand by your side.

May this upcoming year bring you closer to all your aspirations, because you deserve nothing less than fulfillment and genuine happiness. Know that I will always be here to support you in every endeavor.

Wishing you a wonderful celebration today.`,

        2: `On this very special day of your birth, I want to convey my highest admiration and gratitude for the incredible person you have become.

Your growth over the years has been truly remarkable. Witnessing how you achieve your goals while maintaining a kind and compassionate heart makes me so proud to be your partner. Nais ko ring magpasalamat para sa lahat ng sakripisyo at pag-unawa mo sa ating relasyon. You possess a rare kind of beauty both inside and out na patuloy na nagbibigay ng liwanag sa buhay ko.

As you open this new chapter, pray ko na maging matagumpay ang lahat ng iyong mga plano at pangarap. I am fully committed to being your constant ally and partner through every milestone.

Have a blessed and memorable birthday.`,

        3: `I want to formally thank you for being my constant source of peace and stability. In the middle of all the busyness and chaos of life, ang presensya mo ang laging nagpapakalma sa akin. Your kindness, intellect, and unique perspective make you an extraordinary woman, and I am deeply thankful for the love we share. Nagpapasalamat ako na sa bawat araw, pinipili mong maging mabuting bahagi ng buhay ko.

May the Lord grant the desires of your heart today and always. I wish you good health, continuous peace of mind, and the success you so rightfully deserve. I LOVE YOU SO MUCH!!!`,
      };

      const modal = document.getElementById("messageModal");
      const modalText = document.getElementById("modalText");

      // Open specific letter function
      function openMessage(id) {
        modalText.textContent = letters[id];
        modal.style.display = "block";
        setTimeout(() => {
          modal.classList.add("show");
        }, 10);
      }

      function closeModal() {
        modal.classList.remove("show");
        setTimeout(() => {
          modal.style.display = "none";
        }, 400);
      }

      window.onclick = function (event) {
        if (event.target == modal) {
          closeModal();
        }
      };

      // Generate Floating Petals dynamically (Red and Purple themed)
      const petalsContainer = document.getElementById("petals");
      const numberOfPetals = 25;

      for (let i = 0; i < numberOfPetals; i++) {
        let petal = document.createElement("div");
        petal.classList.add("petal");

        petal.style.left = Math.random() * 100 + "vw";
        petal.style.animationDuration = Math.random() * 5 + 5 + "s";
        petal.style.animationDelay = Math.random() * 6 + "s";

        const colors = [
          "rgba(255, 10, 84, 0.4)" /* Light Red */,
          "rgba(255, 179, 193, 0.6)" /* Pastel Pink */,
          "rgba(216, 187, 255, 0.5)" /* Light Purple */,
          "rgba(181, 23, 158, 0.3)" /* Soft Violet */,
        ];
        petal.style.background =
          colors[Math.floor(Math.random() * colors.length)];

        petalsContainer.appendChild(petal);
      }
    </script>
  </body>
</html>
